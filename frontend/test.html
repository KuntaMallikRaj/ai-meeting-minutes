<!DOCTYPE html>
<html>
<head>
    <title>AI Meeting Minutes</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .test { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="test">
        <h1>🧪 Frontend Test Page</h1>
        <p>If you can see this styled content, your frontend server is working correctly!</p>
        <button onclick="testBackend()">Test Backend Connection</button>
        <div id="result"></div>
    </div>
    
    <script>
        async function testBackend() {
            try {
                const response = await fetch('http://127.0.0.1:8001/');
                const data = await response.json();
                document.getElementById('result').innerHTML = `<p style="color: green;">✅ Backend connected: ${data.service}</p>`;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color: red;">❌ Backend error: ${error.message}</p>`;
            }
        }
        
        console.log('Test page loaded successfully!');
    </script>
</body>
</html>
